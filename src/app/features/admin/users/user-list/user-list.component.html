<div class="p-6 max-w-7xl mx-auto">
  
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">User Directory</h1>
      <p class="text-gray-500 text-sm mt-1">Manage system access and view all registered personnel.</p>
    </div>
    
    <div class="w-full md:w-72 relative">
      <input 
        type="text" 
        [(ngModel)]="searchTerm" 
        (input)="filterUsers()"
        placeholder="Search names, emails, roles..." 
        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
      >
      <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
    </div>
    <div class="flex items-center gap-4 w-full md:w-auto">
  <div class="relative flex-1 md:w-72">
     </div>
  
  <a routerLink="/admin/users/new" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition shadow-sm whitespace-nowrap text-sm">
    + Add User
  </a>
</div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full text-left border-collapse">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
            <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">User Details</th>
            <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">System Role</th>
            <!-- <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th> -->
          </tr>
        </thead>
        
        <tbody class="divide-y divide-gray-200" *ngIf="!isLoading">
          <tr *ngFor="let user of filteredUsers" class="hover:bg-gray-50 transition">
            
            <td class="p-4 text-sm font-bold text-gray-600">
              #{{ user.id }}
            </td>
            
            <td class="p-4">
              <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-sm font-bold">
                  {{ user.name?.charAt(0) | uppercase }}
                </div>
                <div>
                  <p class="font-bold text-gray-800 text-sm">{{ user.name }}</p>
                  <p class="text-xs text-gray-500 mt-0.5">{{ user.email }}</p>
                </div>
              </div>
            </td>
            
            <td class="p-4">
              <span [class]="getRoleBadgeClass(user.role?.name || 'Employee')" class="px-3 py-1 text-xs font-bold rounded-full border">
                {{ user.role?.name || 'Employee' }}
              </span>
            </td>

            <!-- <td class="p-4">
              <button class="text-blue-600 hover:text-blue-800 text-sm font-medium transition">
                View Profile
              </button>
            </td> -->

          </tr>
          
          <tr *ngIf="filteredUsers.length === 0">
            <td colspan="4" class="p-12 text-center">
              <p class="text-gray-500 text-lg">No users found.</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="isLoading" class="p-12 text-center">
      <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-600 rounded-full" role="status" aria-label="loading"></div>
      <p class="mt-3 text-gray-500">Loading user directory...</p>
    </div>
  </div>
</div>
