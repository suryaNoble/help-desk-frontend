<div class="p-6 max-w-3xl mx-auto">
  <div class="mb-6 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Add New User</h1>
      <p class="text-gray-500">Register a new employee or administrator into the system.</p>
    </div>
    <a routerLink="/admin/users" class="text-blue-600 hover:text-blue-800 font-medium text-sm">
      &larr; Back to Directory
    </a>
  </div>

  <div class="bg-white rounded-xl shadow-md border border-gray-200 p-8">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
        <input type="text" formControlName="name" placeholder="John Doe"
          class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-500]="userForm.get('name')?.invalid && userForm.get('name')?.touched">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
        <input type="email" formControlName="email" placeholder="name@company.com"
          class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-500]="userForm.get('email')?.invalid && userForm.get('email')?.touched">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Temporary Password</label>
          <input type="password" formControlName="password" placeholder="••••••••"
            class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
            [class.border-red-500]="userForm.get('password')?.invalid && userForm.get('password')?.touched">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">System Role</label>
          <select formControlName="roleId" 
            class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <option [value]="2">Employee</option>
            <option [value]="1">Administrator</option>
          </select>
        </div>
      </div>

      <div class="pt-6 border-t border-gray-100 flex justify-end">
        <button type="submit" [disabled]="isSubmitting"
          class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded transition disabled:bg-gray-400 disabled:cursor-not-allowed flex items-center gap-2">
          <span *ngIf="isSubmitting" class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
          {{ isSubmitting ? 'Saving...' : 'Create User' }}
        </button>
      </div>
    </form>
  </div>
</div>
