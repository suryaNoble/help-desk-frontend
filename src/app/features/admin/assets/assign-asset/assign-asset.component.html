<div class="p-6 max-w-3xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Assign Asset</h1>
    <p class="text-gray-500">Select an employee and a piece of available hardware to map them together.</p>
  </div>

  <div class="bg-white rounded-xl shadow-md border border-gray-200 p-8">
    
    <div *ngIf="successMessage" class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 rounded">
      <p class="font-bold">Success!</p>
      <p>{{ successMessage }}</p>
    </div>

    <form [formGroup]="assignForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Select Employee</label>
        <select 
          formControlName="userId" 
          class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
          [class.border-red-500]="assignForm.get('userId')?.invalid && assignForm.get('userId')?.touched">
          <option value="" disabled selected>-- Choose a User --</option>
          <option *ngFor="let user of users" [value]="user.id">
            {{ user.name }} ({{ user.email }})
          </option>
        </select>
        <p *ngIf="assignForm.get('userId')?.invalid && assignForm.get('userId')?.touched" class="text-red-500 text-xs mt-1">
          Please select an employee.
        </p>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Select Available Asset</label>
        <select 
          formControlName="assetId" 
          class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
          [class.border-red-500]="assignForm.get('assetId')?.invalid && assignForm.get('assetId')?.touched">
          <option value="" disabled selected>-- Choose an Asset --</option>
          <option *ngFor="let asset of availableAssets" [value]="asset.id">
            {{ asset.name }} [S/N: {{ asset.serialNumber }}]
          </option>
        </select>
        <p *ngIf="availableAssets.length === 0" class="text-yellow-600 text-xs mt-1 font-medium">
          No available assets found in inventory.
        </p>
        <p *ngIf="assignForm.get('assetId')?.invalid && assignForm.get('assetId')?.touched" class="text-red-500 text-xs mt-1">
          Please select an asset.
        </p>
      </div>

      <div class="pt-4 border-t border-gray-100 flex justify-end">
        <button 
          type="submit" 
          [disabled]="assignForm.invalid || isSubmitting"
          class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded transition disabled:bg-gray-400 disabled:cursor-not-allowed flex items-center gap-2">
          <span *ngIf="isSubmitting" class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
          Assign Equipment
        </button>
      </div>

    </form>
  </div>
</div>
