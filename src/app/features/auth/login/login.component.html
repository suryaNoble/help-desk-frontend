<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center p-4">
  
  <div class="mb-8 text-center">
    <div class="h-12 w-12 bg-blue-600 text-white rounded-xl flex items-center justify-center mx-auto mb-3 shadow-lg">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
    </div>
    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">IT Help Desk</h1>
    <p class="text-gray-500 mt-1">Enterprise Support Portal</p>
  </div>

  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-center text-white">
      <h2 class="text-2xl font-bold">Welcome Back</h2>
      <p class="text-blue-100 text-sm mt-1">Please sign in to your account</p>
    </div>

    <div class="p-8">
      <div *ngIf="errorMessage" class="mb-6 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded">
        {{ errorMessage }}
      </div>

      <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
          <input 
            type="email" 
            formControlName="email" 
            placeholder="name@company.com"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition"
            [class.border-red-500]="authForm.get('email')?.invalid && authForm.get('email')?.touched"
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input 
            type="password" 
            formControlName="password" 
            placeholder="••••••••"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition"
            [class.border-red-500]="authForm.get('password')?.invalid && authForm.get('password')?.touched"
          >
        </div>

        <button 
          type="submit" 
          [disabled]="authForm.invalid || isLoading"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition disabled:bg-gray-400 disabled:cursor-not-allowed flex items-center justify-center mt-6 shadow-md">
          <span *ngIf="isLoading" class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full mr-2"></span>
          {{ isLoading ? 'Authenticating...' : 'Sign In' }}
        </button>
      </form>
    </div>
  </div>
</div>
