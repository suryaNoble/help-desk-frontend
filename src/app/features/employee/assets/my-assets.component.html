<div class="p-6 max-w-6xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">My Assigned Assets</h1>
    <p class="text-gray-500">Hardware and software currently registered to you.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let asset of assets$ | async" 
         class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 hover:shadow-md transition">
      
      <div class="flex justify-between items-start mb-4">
        <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
        </div>
        <span class="px-2 py-1 bg-green-100 text-green-800 text-xs font-bold rounded-full">
          {{ asset.status }}
        </span>
      </div>

      <h3 class="text-lg font-bold text-gray-800 mb-1">{{ asset.name }}</h3>
      
      <div class="space-y-2 mt-4 text-sm text-gray-600">
        <div class="flex justify-between">
          <span class="font-medium">S/N:</span>
          <span class="font-mono text-gray-800">{{ asset.serialNumber }}</span>
        </div>
        <div class="flex justify-between">
          <span class="font-medium">Category:</span>
          <span>{{ asset.category?.name }}</span>
        </div>
        <div class="flex justify-between" *ngIf="asset.category?.parentCategory">
  <span>{{ asset.category?.parentCategory?.name }}</span>
</div>
      </div>
      
    </div>
  </div>

  <div *ngIf="(assets$ | async)?.length === 0" class="mt-10 p-10 bg-white border border-dashed border-gray-300 rounded-lg text-center">
    <p class="text-gray-500 text-lg">You currently have no assigned assets.</p>
  </div>
</div>
